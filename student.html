<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Khu Vực Thi - Hệ Thống Trắc Nghiệm</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        /* ========================================= */
        /* RESET & GOOGLE FONTS (Inter)              */
        /* ========================================= */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        * { 
            box-sizing: border-box; margin: 0; padding: 0; outline: none; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #F8FAFC; /* Nền xám xanh cực nhạt */
            min-height: 100vh; 
            display: flex; justify-content: center; align-items: center;
            padding: 20px; color: #1E293B;
            position: relative;
            overflow-x: hidden;
        }

        /* Ambient Background Blobs (Tạo chiều sâu mờ ảo) */
        body::before, body::after {
            content: ''; position: fixed; border-radius: 50%; filter: blur(100px); z-index: -1;
            animation: float 20s infinite alternate ease-in-out;
        }
        body::before {
            width: 50vw; height: 50vw; max-width: 600px; max-height: 600px;
            background: rgba(99, 102, 241, 0.15); /* Indigo nhạt */
            top: -10%; left: -10%;
        }
        body::after {
            width: 40vw; height: 40vw; max-width: 500px; max-height: 500px;
            background: rgba(236, 72, 153, 0.15); /* Pink nhạt */
            bottom: -10%; right: -10%;
            animation-delay: -10s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        /* ========================================= */
        /* MODERN CARDS (Khu vực nội dung chính)     */
        /* ========================================= */
        .glass-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 
                0 4px 6px -1px rgba(0, 0, 0, 0.05), 
                0 25px 50px -12px rgba(0, 0, 0, 0.1); /* Soft, deep shadow */
            border-radius: 32px; /* Bo góc lớn hiện đại */
            width: 100%; max-width: 480px; text-align: center;
            padding: 40px 32px;
            transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .home-container { max-width: 900px; padding: 30px; }
        .exam-container { max-width: 860px; padding: 35px 45px; text-align: left; }

        /* Typography */
        h2 { font-size: 28px; margin-bottom: 8px; font-weight: 800; color: #0F172A; letter-spacing: -0.5px;}
        p.subtitle { color: #64748B; margin-bottom: 32px; font-size: 15px; font-weight: 500; }

        /* ========================================= */
        /* INPUTS & BUTTONS                          */
        /* ========================================= */
        .form-input {
            width: 100%; padding: 18px 24px; 
            border: 2px solid #E2E8F0; 
            border-radius: 20px; 
            background: #F8FAFC; 
            font-size: 16px; text-align: center; margin-bottom: 16px; 
            transition: all 0.3s ease;
            color: #1E293B; font-weight: 600;
            font-family: inherit;
        }
        .form-input::placeholder { color: #94A3B8; font-weight: 500; }
        .form-input:focus {
            background: #FFFFFF; 
            border-color: #6366F1; /* Indigo Focus */
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
            transform: translateY(-2px);
        }
        .input-code { font-size: 28px; font-weight: 800; letter-spacing: 12px; color: #6366F1; text-transform: uppercase;}

        .btn {
            width: 100%; padding: 18px; border: none; border-radius: 20px; 
            font-size: 16px; font-weight: 700; cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
            background: linear-gradient(135deg, #6366F1 0%, #4F46E5 100%); /* Nút xanh Gradient */
            color: white; 
            box-shadow: 0 10px 20px -10px rgba(79, 70, 229, 0.5); 
            margin-bottom: 12px;
            font-family: inherit;
        }
        .btn:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 15px 25px -10px rgba(79, 70, 229, 0.6); 
            background: linear-gradient(135deg, #4F46E5 0%, #4338CA 100%);
        }
        .btn:active { transform: translateY(1px); box-shadow: 0 5px 10px -5px rgba(79, 70, 229, 0.5); }
        
        .btn-submit-exam { 
            background: linear-gradient(135deg, #10B981 0%, #059669 100%); /* Xanh lá nộp bài */
            box-shadow: 0 10px 20px -10px rgba(16, 185, 129, 0.5); 
            margin-top: 40px; font-size: 18px; padding: 20px;
        }
        .btn-submit-exam:hover { 
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
            box-shadow: 0 15px 25px -10px rgba(16, 185, 129, 0.6); 
        }
        
        .btn-outline { 
            background: transparent; color: #6366F1; 
            border: 2px solid #E0E7FF; box-shadow: none; 
        }
        .btn-outline:hover { 
            background: #EEF2FF; border-color: #C7D2FE; color: #4F46E5;
            box-shadow: none;
        }

        /* ========================================= */
        /* BỐ CỤC TRANG CHỦ                          */
        /* ========================================= */
        .grid-home { display: grid; grid-template-columns: 1.1fr 1.3fr; gap: 30px; }
        @media (max-width: 850px) { 
            .grid-home { grid-template-columns: 1fr; } 
            .exam-container { padding: 25px 20px; } 
        }
        
        .code-section, .list-section { 
            background: rgba(248, 250, 252, 0.7); 
            padding: 32px 24px; 
            border-radius: 28px; 
            border: 1px solid #F1F5F9; 
            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.8);
        }
        .code-section { display: flex; flex-direction: column; justify-content: center; }
        
        /* Cập nhật header danh sách phòng */
        .list-section h2 { 
            display: flex; justify-content: space-between; align-items: center; 
            font-size: 22px; margin-bottom: 20px;
        }
        .btn-refresh {
            background: #EEF2FF; color: #6366F1; border: none; 
            padding: 8px 16px; border-radius: 12px; cursor: pointer; 
            font-size: 14px; font-weight: 600; transition: all 0.2s;
        }
        .btn-refresh:hover { background: #E0E7FF; transform: scale(1.05); }

        .exam-list-scroll { max-height: 380px; overflow-y: auto; padding-right: 8px; }
        .exam-list-scroll::-webkit-scrollbar { width: 6px; }
        .exam-list-scroll::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
        .exam-list-scroll::-webkit-scrollbar-thumb:hover { background: #94A3B8; }
        
        /* Thẻ phòng thi */
        .active-exam-card {
            background: #FFFFFF; 
            border: 1px solid #E2E8F0; 
            padding: 18px 20px; 
            border-radius: 20px; 
            margin-bottom: 16px; 
            display: flex; justify-content: space-between; align-items: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
            text-align: left;
        }
        .active-exam-card:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); 
            border-color: #C7D2FE;
        }
        .exam-title { font-weight: 700; color: #1E293B; margin-bottom: 6px; font-size: 17px; line-height: 1.3;}
        .exam-meta { font-size: 13px; color: #64748B; font-weight: 500; }
        
        .btn-join { 
            background: #EEF2FF; color: #4F46E5; border: none; padding: 12px 20px; 
            border-radius: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; font-size: 14px;
            white-space: nowrap; margin-left: 15px;
        }
        .btn-join:hover { background: #6366F1; color: white; transform: scale(1.05); }

        /* ========================================= */
        /* GIAO DIỆN LÀM BÀI                         */
        /* ========================================= */
        
        /* Sticky Header */
        .exam-header { 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px);
            padding: 16px 28px; border-radius: 24px; margin-bottom: 35px; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); 
            position: sticky; top: 15px; z-index: 100; border: 1px solid rgba(255, 255, 255, 1);
        }
        #displayStudentName { font-weight: 700; color: #475569; font-size: 16px; }
        .timer-box { 
            font-size: 20px; font-weight: 800; color: #EF4444; 
            font-variant-numeric: tabular-nums; 
            background: #FEF2F2; padding: 8px 16px; border-radius: 14px;
            display: flex; align-items: center; gap: 8px;
        }
        
        /* Thẻ câu hỏi */
        .question-card { 
            background: #FFFFFF; padding: 32px; border-radius: 28px; 
            margin-bottom: 24px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.02); 
            border: 1px solid #F1F5F9; transition: all 0.3s;
        }
        .question-card:hover { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04); }
        .question-text { 
            font-size: 18px; font-weight: 600; margin-bottom: 24px; 
            line-height: 1.6; color: #0F172A; 
        }
        
        /* NÚT CHỌN ĐÁP ÁN (Premium Magic) */
        .options { display: flex; flex-direction: column; gap: 14px; }
        .option-label input { display: none; }
        .option-label { 
            display: flex; align-items: center; padding: 16px 20px; 
            background: #F8FAFC; 
            border: 2px solid #E2E8F0; 
            border-radius: 18px; cursor: pointer; 
            transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1); 
            font-size: 16px; font-weight: 500; color: #334155; line-height: 1.5;
            position: relative; overflow: hidden;
        }
        .option-label:hover { 
            background: #FFFFFF; border-color: #CBD5E1; 
            transform: translateX(4px); /* Hover trượt nhẹ sang phải */
        }
        
        /* Trạng thái được chọn (Checked) */
        .option-label:has(input:checked) {
            background: #EEF2FF; 
            color: #4338CA; 
            border: 2px solid #6366F1; 
            font-weight: 600;
            transform: translateX(8px); /* Trượt rõ hơn khi chọn */
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.1);
        }
        /* Dấu chấm tròn ảo trước đáp án khi chọn */
        .option-label:has(input:checked)::before {
            content: ''; display: inline-block; width: 10px; height: 10px;
            background: #6366F1; border-radius: 50%; margin-right: 12px;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        /* ========================================= */
        /* TRẠNG THÁI XEM LẠI BÀI (Review Mode)      */
        /* ========================================= */
        .opt-correct { 
            background: #ECFDF5 !important; 
            color: #047857 !important; 
            border: 2px solid #34D399 !important; 
            font-weight: 700; transform: translateX(8px);
        }
        .opt-correct::before {
            content: '✓'; display: inline-flex; justify-content: center; align-items: center;
            width: 20px; height: 20px; background: #10B981; color: white; border-radius: 50%; 
            margin-right: 12px; font-size: 12px;
        }

        .opt-wrong { 
            background: #FEF2F2 !important; 
            color: #B91C1C !important; 
            border: 2px solid #F87171 !important; 
            font-weight: 600; transform: translateX(8px);
        }
        .opt-wrong::before {
            content: '×'; display: inline-flex; justify-content: center; align-items: center;
            width: 20px; height: 20px; background: #EF4444; color: white; border-radius: 50%; 
            margin-right: 12px; font-size: 14px; font-weight: bold;
        }

        .opt-disabled { cursor: default; opacity: 0.8; }
        .opt-disabled:hover { transform: none; border-color: #E2E8F0; background: #F8FAFC;}

        .badge-result { 
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 16px; border-radius: 14px; font-size: 14px; font-weight: 700; 
            margin-bottom: 20px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .badge-right { background: #ECFDF5; color: #047857; border: 1px solid #A7F3D0; }
        .badge-wrong { background: #FEF2F2; color: #B91C1C; border: 1px solid #FECACA; }

        /* Kết quả */
        #scoreDisplay { font-size: 80px; font-weight: 900; color: #10B981; margin: 10px 0; letter-spacing: -2px;}
        #correctCountDisplay { background: #F1F5F9; display: inline-block; padding: 10px 20px; border-radius: 20px;}

        /* Mặc định ẩn các form */
        #step-info, #step-exam, #step-result, #step-review { display: none; opacity: 0; transform: translateY(10px); }
    </style>
</head>
<body>

    <div id="step-room" class="glass-container home-container">
        <div class="grid-home">
            <div class="code-section">
                <h2>Vào Bằng Mã</h2>
                <p class="subtitle">Nhập mã 6 số được cấp</p>
                <input type="number" id="roomCodeInput" class="form-input input-code" placeholder="------" oninput="this.value=this.value.slice(0,6)">
                <button id="btnCheckRoom" class="btn">Vào Thi Ngay</button>
            </div>

            <div class="list-section">
                <h2>
                    Phòng Đang Mở
                    <button class="btn-refresh" onclick="fetchActiveExams()" title="Làm mới">🔄 Cập nhật</button>
                </h2>
                <div class="exam-list-scroll" id="activeExamsContainer">
                    <p style="text-align: center; color: #94A3B8; margin-top: 20px; font-weight: 500;">Đang tải danh sách...</p>
                </div>
            </div>
        </div>
    </div>

    <div id="step-info" class="glass-container">
        <h2>Thông Tin Thí Sinh</h2>
        <p class="subtitle" id="examTitleDisplay" style="color: #4F46E5; font-weight: 700; font-size: 16px;">Đang tải...</p>
        
        <input type="text" id="studentName" class="form-input" placeholder="Họ và tên của bạn" required>
        <input type="text" id="studentClass" class="form-input" placeholder="Lớp (VD: 10A1, 12A2...)" required>
        
        <button id="btnStartExam" class="btn">Bắt Đầu Bài Thi</button>
        <button onclick="showStep('step-room')" class="btn btn-outline">Quay lại</button>
    </div>
    
    <div id="step-exam" class="glass-container exam-container">
        <div class="exam-header">
            <div id="displayStudentName">---</div>
            <div class="timer-box">⏱ <span id="timerDisplay">00:00</span></div>
        </div>
        <div id="questionsContainer"></div>
        <button id="btnSubmitExam" class="btn btn-submit-exam">Nộp Bài Ngay</button>
    </div>

    <div id="step-result" class="glass-container">
        <h2>Hoàn Thành!</h2>
        <p class="subtitle">Điểm số của bạn</p>
        <div id="scoreDisplay">--/10</div>
        <p id="correctCountDisplay" class="subtitle" style="color: #475569; font-weight: 700; margin-bottom: 35px; margin-top: 10px;">Số câu đúng: --/--</p>
        <button id="btnShowReview" class="btn btn-outline">Xem Chi Tiết Bài Làm</button>
        <button onclick="window.location.href='index.html'" class="btn">Về Trang Chủ</button>
    </div>

    <div id="step-review" class="glass-container exam-container">
        <div class="exam-header" style="justify-content: center;">
            <div style="font-size: 20px; font-weight: 800; color: #4F46E5; text-transform: uppercase;">Chi Tiết Bài Làm</div>
        </div>
        <div id="reviewContainer"></div>
        <button id="btnBackToResult" class="btn" style="margin-top: 30px;">Quay Lại Bảng Điểm</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCuRHLzyXZJgL1xfQMIeyMlYc5YX0p5bmM",
            authDomain: "neww-16bc7.firebaseapp.com",
            projectId: "neww-16bc7",
            storageBucket: "neww-16bc7.firebasestorage.app",
            messagingSenderId: "305448357382",
            appId: "1:305448357382:web:69fb9d1509ecd658bebd87"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentExam = null, currentStudent = {}, timerInterval, savedAnswers = {}, isExamActive = false, cheatWarnings = 0;
        let shuffledQuestions = [];

        function shuffleArray(array) {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        }

        function prepareShuffledExam(originalQuestions) {
            let questionsWithIdx = originalQuestions.map((q, i) => ({ ...q, originalIndex: i }));
            let questions = shuffleArray(questionsWithIdx);
            
            return questions.map(q => {
                let optionsArray = Object.keys(q.options).map(key => ({
                    originalKey: key,
                    content: q.options[key]
                }));

                optionsArray = shuffleArray(optionsArray);
                let newOptions = {};
                let newCorrectAnswer = "";
                let keyMapping = {}; 

                optionsArray.forEach((opt, index) => {
                    const newKey = String.fromCharCode(65 + index); // A, B, C, D
                    newOptions[newKey] = opt.content;
                    keyMapping[newKey] = opt.originalKey;
                    if (opt.originalKey === q.correctAnswer) {
                        newCorrectAnswer = newKey;
                    }
                });

                return {
                    ...q,
                    options: newOptions,
                    correctAnswer: newCorrectAnswer,
                    keyMapping: keyMapping
                };
            });
        }

        window.showStep = function(stepId) {
            ['step-room', 'step-info', 'step-exam', 'step-result', 'step-review'].forEach(id => {
                const el = document.getElementById(id);
                if(el) {
                    el.style.display = 'none';
                    el.style.opacity = '0';
                    el.style.transform = 'translateY(10px)';
                }
            });
            const target = document.getElementById(stepId);
            if(target) {
                target.style.display = 'block';
                setTimeout(() => {
                    target.style.opacity = '1';
                    target.style.transform = 'translateY(0)';
                }, 30);
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.fetchActiveExams = async function() {
            const container = document.getElementById('activeExamsContainer');
            container.innerHTML = '<p style="text-align: center; color: #94A3B8; margin-top: 20px; font-weight:500;">Đang cập nhật...</p>';
            try {
                const q = query(collection(db, "exams"), where("status", "==", "active"));
                const querySnapshot = await getDocs(q);
                if (querySnapshot.empty) {
                    container.innerHTML = '<p style="text-align: center; color: #EF4444; margin-top: 20px; font-weight:600;">Hiện chưa có bài thi nào đang mở.</p>';
                    return;
                }
                const examsArray = [];
                querySnapshot.forEach(doc => { examsArray.push({ id: doc.id, ...doc.data() }); });
                examsArray.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
                container.innerHTML = '';
                examsArray.forEach(exam => {
                    const examDataStr = encodeURIComponent(JSON.stringify(exam));
                    container.innerHTML += `
                        <div class="active-exam-card">
                            <div>
                                <div class="exam-title">${exam.title}</div>
                                <div class="exam-meta">GV: <b>${exam.teacherName || 'Admin'}</b> • ⏱ ${exam.timeLimit} phút</div>
                            </div>
                            <button class="btn-join" onclick="joinExamDirectly('${examDataStr}')">Tham gia</button>
                        </div>`;
                });
            } catch (error) { container.innerHTML = '<p style="text-align: center; color: #EF4444; font-weight:600;">Lỗi kết nối!</p>'; }
        }

        window.joinExamDirectly = function(encodedExamData) {
            currentExam = JSON.parse(decodeURIComponent(encodedExamData));
            document.getElementById('examTitleDisplay').innerText = currentExam.title;
            showStep('step-info');
        }

        // KHI MỞ TRANG: KIỂM TRA XEM CÓ BÀI THI ĐANG LÀM DỞ (F5) HAY KHÔNG
        window.onload = () => {
            fetchActiveExams();
            document.getElementById('step-room').style.opacity = '1';
            document.getElementById('step-room').style.transform = 'translateY(0)';
            
            const savedName = localStorage.getItem('hs_name');
            const savedClass = localStorage.getItem('hs_class');
            if(savedName) document.getElementById('studentName').value = savedName;
            if(savedClass) document.getElementById('studentClass').value = savedClass;

            // Kiểm tra Session làm bài dở
            const sessionStr = localStorage.getItem('exam_active_session');
            if (sessionStr) {
                const session = JSON.parse(sessionStr);
                const remainingSecs = Math.floor((session.endTime - Date.now()) / 1000);
                
                if (remainingSecs > 0) {
                    Swal.fire({
                        title: 'Đang có bài thi dở!',
                        text: `Hệ thống phát hiện bạn đang làm bài: ${session.exam.title}. Tiếp tục làm?`,
                        icon: 'info',
                        showCancelButton: true,
                        confirmButtonText: 'Tiếp tục',
                        cancelButtonText: 'Hủy bài cũ',
                        confirmButtonColor: '#007AFF',
                        cancelButtonColor: '#FF3B30',
                        allowOutsideClick: false
                    }).then((result) => {
                        if (result.isConfirmed) {
                            // Khôi phục trạng thái
                            currentExam = session.exam;
                            currentStudent = session.student;
                            shuffledQuestions = session.shuffled;
                            cheatWarnings = session.cheatWarnings || 0;
                            isExamActive = true;
                            
                            document.getElementById('displayStudentName').innerText = `${currentStudent.name} • Lớp ${currentStudent.class}`;
                            renderQuestions(); // Sẽ tự động tick lại đáp án đã lưu
                            showStep('step-exam');
                            startTimer(remainingSecs / 60); 
                        } else {
                            localStorage.removeItem('exam_active_session');
                            localStorage.removeItem('exam_draft_answers');
                        }
                    });
                } else {
                    // Quá giờ -> Xóa session rác
                    localStorage.removeItem('exam_active_session');
                    localStorage.removeItem('exam_draft_answers');
                }
            }
        };

        document.getElementById('btnCheckRoom').addEventListener('click', async () => {
            const code = document.getElementById('roomCodeInput').value.trim();
            if(code.length !== 6) return Swal.fire('Lỗi', 'Nhập đúng mã 6 số!', 'warning');
            Swal.fire({ title: 'Đang tìm phòng...', didOpen: () => Swal.showLoading() });
            try {
                const q = query(collection(db, "exams"), where("roomCode", "==", code), where("status", "==", "active"));
                const querySnapshot = await getDocs(q);
                if (querySnapshot.empty) Swal.fire('Thất bại', 'Mã không đúng hoặc đã đóng!', 'error');
                else {
                    querySnapshot.forEach((doc) => { currentExam = { id: doc.id, ...doc.data() }; });
                    Swal.close();
                    document.getElementById('examTitleDisplay').innerText = currentExam.title;
                    showStep('step-info');
                }
            } catch (error) { Swal.fire('Lỗi mạng', error.message, 'error'); }
        });

        document.getElementById('btnStartExam').addEventListener('click', async () => {
            const name = document.getElementById('studentName').value.trim();
            const sClass = document.getElementById('studentClass').value.trim().toUpperCase();
            const classRegex = /^(6|7|8|9|10|11|12)[A-Z]\d{1,2}$/;

            if(!name || !sClass) return Swal.fire('Lỗi', 'Không để trống!', 'warning');
            if(!classRegex.test(sClass)) return Swal.fire({ icon: 'warning', title: 'Lớp sai định dạng!', text: 'VD: 10A1, 12B2...' });

            Swal.fire({ title: 'Đang chuẩn bị đề thi...', didOpen: () => Swal.showLoading() });
            try {
                localStorage.setItem('hs_name', name); 
                localStorage.setItem('hs_class', sClass);
                const userCred = await signInAnonymously(auth);
                currentStudent = { uid: userCred.user.uid, name: name, class: sClass };

                shuffledQuestions = prepareShuffledExam(currentExam.questions);
                cheatWarnings = 0;

                // TẠO SESSION LƯU TRẠNG THÁI BÀI THI CHỐNG F5
                const endTime = Date.now() + currentExam.timeLimit * 60 * 1000;
                localStorage.setItem('exam_active_session', JSON.stringify({
                    exam: currentExam, student: currentStudent, shuffled: shuffledQuestions, endTime: endTime, cheatWarnings: cheatWarnings
                }));
                localStorage.removeItem('exam_draft_answers'); // Reset nháp cũ

                document.getElementById('displayStudentName').innerText = `${name} • Lớp ${sClass}`;
                renderQuestions();
                showStep('step-exam');
                Swal.close();
                isExamActive = true; 
                startTimer(currentExam.timeLimit);
            } catch (error) { Swal.fire('Lỗi hệ thống', error.message, 'error'); }
        });

        document.addEventListener("visibilitychange", () => {
            if (document.hidden && isExamActive) {
                cheatWarnings++;
                // Cập nhật số lần gian lận vào Session
                const sessionStr = localStorage.getItem('exam_active_session');
                if (sessionStr) {
                    let session = JSON.parse(sessionStr);
                    session.cheatWarnings = cheatWarnings;
                    localStorage.setItem('exam_active_session', JSON.stringify(session));
                }
                Swal.fire({ icon: 'warning', title: 'CẢNH BÁO', text: `Rời khỏi màn hình lần ${cheatWarnings}!` });
            }
        });

        // TỰ ĐỘNG LƯU ĐÁP ÁN NHÁP MỖI KHI CLICK
        document.addEventListener('change', (e) => {
            if (e.target.type === 'radio' && isExamActive) {
                let draft = JSON.parse(localStorage.getItem('exam_draft_answers') || '{}');
                draft[e.target.name] = e.target.value;
                localStorage.setItem('exam_draft_answers', JSON.stringify(draft));
            }
        });

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            
            // Lấy lại nháp nếu có (trường hợp bị F5)
            let draft = JSON.parse(localStorage.getItem('exam_draft_answers') || '{}');

            shuffledQuestions.forEach((q, index) => {
                let html = `
                    <div class="question-card">
                        <div class="question-text">Câu ${index + 1}: ${q.question}</div>
                        <div class="options">`;
                
                ['A', 'B', 'C', 'D'].forEach(opt => {
                    const isChecked = draft[`q_${index}`] === opt ? "checked" : "";
                    html += `<label class="option-label"><input type="radio" name="q_${index}" value="${opt}" ${isChecked}> ${opt}. ${q.options[opt]}</label>`;
                });
                
                html += `</div></div>`;
                container.innerHTML += html;
            });
        }

        function startTimer(minutes) {
            let timeTotal = Math.floor(minutes * 60);
            const display = document.getElementById('timerDisplay');
            timerInterval = setInterval(() => {
                let m = Math.floor(timeTotal / 60); 
                let s = timeTotal % 60;
                display.innerText = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
                if (timeTotal <= 60) {
                    display.style.color = '#FFFFFF';
                    display.parentElement.style.background = '#EF4444'; 
                } else {
                    display.style.color = '#EF4444';
                    display.parentElement.style.background = 'rgba(255, 255, 255, 0.4)'; 
                }
                if (timeTotal <= 0) { clearInterval(timerInterval); submitLogic(); }
                timeTotal--;
            }, 1000);
        }

        document.getElementById('btnSubmitExam').addEventListener('click', () => {
            Swal.fire({ 
                title: 'Chốt nộp bài?', 
                text: "Bạn không thể sửa đổi sau khi nộp!", 
                icon: 'question', 
                showCancelButton: true, 
                confirmButtonColor: '#34C759', 
                confirmButtonText: 'Nộp Ngay', 
                cancelButtonText: 'Kiểm tra lại' 
            }).then((result) => { if (result.isConfirmed) submitLogic(); });
        });

        async function submitLogic() {
            clearInterval(timerInterval); 
            isExamActive = false;
            Swal.fire({ title: 'Đang chấm điểm...', didOpen: () => Swal.showLoading() });

            let correctCount = 0; 
            const totalQ = shuffledQuestions.length;
            
            let dbAnswers = {}; 
            let localAnswers = {}; 

            shuffledQuestions.forEach((q, index) => {
                const selected = document.querySelector(`input[name="q_${index}"]:checked`);
                const val = selected ? selected.value : null; 
                
                localAnswers[`q_${index}`] = val; 
                
                const originalQIdx = q.originalIndex;
                const originalAnsKey = val ? q.keyMapping[val] : null;
                dbAnswers[`q_${originalQIdx}`] = originalAnsKey;

                if (val === q.correctAnswer) correctCount++;
            });
            
            savedAnswers = localAnswers; 

            const finalScore = ((correctCount / totalQ) * 10).toFixed(2);
            try {
                await addDoc(collection(db, "results"), {
                    examId: currentExam.id, 
                    roomCode: currentExam.roomCode,
                    studentUid: currentStudent.uid, 
                    studentName: currentStudent.name,
                    studentClass: currentStudent.class, 
                    score: parseFloat(finalScore),
                    correctCount: correctCount, 
                    totalQuestions: totalQ,
                    answers: dbAnswers, 
                    cheatWarnings: cheatWarnings,
                    submittedAt: serverTimestamp()
                });
                
                // NỘP THÀNH CÔNG -> DỌN DẸP SESSION F5
                localStorage.removeItem('exam_active_session');
                localStorage.removeItem('exam_draft_answers');

                Swal.close();
                document.getElementById('scoreDisplay').innerText = `${finalScore}/10`;
                document.getElementById('correctCountDisplay').innerText = `Đúng: ${correctCount} / ${totalQ}`;
                showStep('step-result');
            } catch (error) { Swal.fire('Lỗi', error.message, 'error'); }
        }

        document.getElementById('btnShowReview').addEventListener('click', () => {
            const container = document.getElementById('reviewContainer');
            container.innerHTML = ''; 
            shuffledQuestions.forEach((q, index) => {
                const studentAns = savedAnswers[`q_${index}`];
                const isCorrect = studentAns === q.correctAnswer;
                const badgeHtml = studentAns == null 
                    ? `<span class="badge-result badge-wrong">Chưa chọn</span>` 
                    : `<span class="badge-result ${isCorrect ? 'badge-right' : 'badge-wrong'}">${isCorrect ? 'Đúng' : 'Sai'}</span>`;
                
                let html = `<div class="question-card">${badgeHtml}<div class="question-text">Câu ${index + 1}: ${q.question}</div><div class="options">`;
                ['A', 'B', 'C', 'D'].forEach(opt => {
                    let optClass = "option-label opt-disabled";
                    if (opt === q.correctAnswer) optClass += " opt-correct";
                    else if (opt === studentAns && studentAns !== q.correctAnswer) optClass += " opt-wrong";
                    const isChecked = opt === studentAns ? "checked" : "";
                    html += `<label class="${optClass}"><input type="radio" disabled ${isChecked}> ${opt}. ${q.options[opt]}</label>`;
                });
                html += `</div></div>`;
                container.innerHTML += html;
            });
            showStep('step-review');
        });

        document.getElementById('btnBackToResult').addEventListener('click', () => { showStep('step-result'); });
        // Chống chuột phải
    document.addEventListener('contextmenu', event => event.preventDefault());

    // Chống phím tắt F12, Ctrl+Shift+I, Ctrl+U
    document.onkeydown = function(e) {
        if (e.keyCode == 123 || 
           (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) || 
           (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0))) {
            return false;
        }
    };
    </script>
</body>
</html>
